name: "0 — MASTER TRIGGER (Full Pipeline + YouTube Upload)"

on:
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip audio generation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_to_youtube:
        description: "Upload final video to YouTube"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  review:
    name: "Stage 0 — Code Review & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck

  audio:
    name: "Stage 1 — Generate Audio (Suresh)"
    runs-on: ubuntu-latest
    needs: [review]
    if: ${{ inputs.skip_audio != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: |
          pip install torch transformers accelerate soundfile --quiet
          pip install git+https://github.com/huggingface/parler-tts.git --quiet
      - name: Generate narration audio
        run: python scripts/generate_audio.py
      - name: Upload audio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
          retention-days: 30

  bundle:
    name: "Stage 2a — Bundle Project"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Create Bundle
        run: npx remotion bundle src/index.ts out/bundle.js
      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle.js

  render:
    name: "Stage 2b — Render"
    runs-on: ubuntu-latest
    needs: [audio, bundle]
    if: always() && (needs.audio.result == 'success' || needs.audio.result == 'skipped') && needs.bundle.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - { id: "chunk_01_hook",      compositionId: "chunk_01_hook" }
          - { id: "chunk_02_setup",     compositionId: "chunk_02_setup" }
          - { id: "chunk_03_mechanism", compositionId: "chunk_03_mechanism" }
          - { id: "chunk_04_proof",     compositionId: "chunk_04_proof" }
          - { id: "chunk_05_twist",     compositionId: "chunk_05_twist" }
          - { id: "chunk_06_outro",     compositionId: "chunk_06_outro" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: remotion-bundle
          path: out/
      - name: Download audio assets
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Install Chrome
        run: npx remotion browser ensure
      - name: Render chunk
        run: |
          npx remotion render \
            out/bundle.js \
            ${{ matrix.chunk.compositionId }} \
            out/${{ matrix.chunk.id }}.mp4 \
            --codec=h264 \
            --crf=18 \
            --concurrency=2
        env:
          REMOTION_ALLOW_EVAL: true
      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk.id }}
          path: out/${{ matrix.chunk.id }}.mp4

  assemble:
    name: "Stage 3 — Assemble Final Video"
    runs-on: ubuntu-latest
    needs: [render]
    if: needs.render.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          path: out/
          merge-multiple: true
      - name: Download audio
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Install Python deps
        run: pip install pydub --quiet
      - name: Assemble final video
        run: python scripts/assemble_video.py
      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: EyeTwitch-FINAL
          path: out/EyeTwitch_FINAL.mp4

  youtube:
    name: "Stage 4 — Upload to YouTube"
    runs-on: ubuntu-latest
    needs: [assemble]
    if: needs.assemble.result == 'success' && inputs.upload_to_youtube == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests --quiet
      - name: Download final video
        uses: actions/download-artifact@v4
        with:
          name: EyeTwitch-FINAL
          path: out/
      - name: Upload to YouTube
        env:
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/youtube_upload.py

